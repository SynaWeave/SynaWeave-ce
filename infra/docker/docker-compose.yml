#  ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# TL;DR  -->  boot the first local production-like proof stack for API ingest traces metrics dashboards and MLflow eval evidence
#
# - Later Extension Points:
#   --> add Langfuse or broader storage backends only when those services become required local defaults for the team
#
# - Role:
#   --> starts the API service plus collector Prometheus Grafana and MLflow around the Sprint 1 runtime path
#   --> gives the team one simple local stack for demo preparation baseline capture and offline eval tracking
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~

name: synaweave-observability

services:
  mlflow:
    image: python:3.13-slim
    working_dir: /repo
    command: >-
      bash -lc "python3 -m pip install -r requirements-app.txt
      && mkdir -p /repo/build/mlflow/artifacts
      && python3 -m mlflow server
      --backend-store-uri sqlite:////repo/build/mlflow/mlflow.db
      --artifacts-destination file:///repo/build/mlflow/artifacts
      --host 0.0.0.0 --port 5001"
    volumes:
      - ../../:/repo
    ports:
      - "5001:5001"

  api:
    image: python:3.13-slim
    working_dir: /repo
    command: bash -lc "python3 -m pip install -r requirements-app.txt && python3 -m uvicorn apps.api.main:app --host 0.0.0.0 --port 8000"
    environment:
      - TRACE_ON=true
      - SW_ENV=local
      - TRACE_OTLP_URL=http://otel-collector:4318
    volumes:
      - ../../:/repo
    ports:
      - "8000:8000"
    depends_on:
      - otel-collector
      - mlflow

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command:
      - --config=/etc/otelcol-contrib/config.yaml
    volumes:
      - ./otel-collector.yml:/etc/otelcol-contrib/config.yaml:ro
      - ../../build/observability:/var/lib/otel
    ports:
      - "4317:4317"
      - "4318:4318"

  prometheus:
    image: prom/prometheus:latest
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus-rules.yml:/etc/prometheus/prometheus-rules.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - api

  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
