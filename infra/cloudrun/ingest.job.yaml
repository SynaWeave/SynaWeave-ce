#  ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# TL;DR  -->  record the intended Cloud Run job shape for the Sprint 1 ingest worker boundary
#
# - Later Extension Points:
#   --> add retry limits and environment wiring only when job deployment becomes a tracked repo default
#
