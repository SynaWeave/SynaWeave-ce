<!DOCTYPE html>
<!-- side-panel shell for shared identity, durable actions, and digest proof in the extension runtime -->
<!-- this shell mirrors the web path so Sprint 1 can prove the same user across both surfaces -->
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>SynaWeave Panel</title>
	<link rel="stylesheet" href="./styles.css" />
</head>

<body>
	<main class="panel-shell">
		<header class="panel-hero">
			<p class="eyebrow">Extension bridge</p>
			<h1>SynaWeave</h1>
			<p class="lede">Use the same email as the web shell, pull a page selection, then write a durable action and run the digest.</p>
		</header>

		<section id="auth-section" class="card">
			<h2>Sign in</h2>
			<label for="ext-email-input">Email</label>
			<input id="ext-email-input" type="email" placeholder="you@example.com" />
			<button id="ext-sign-in-button" type="button">Connect panel session</button>
		</section>

		<section id="workspace-section" class="card hidden">
			<div class="row between">
				<h2>Workspace</h2>
				<button id="ext-sign-out-button" type="button">Sign out</button>
			</div>
			<p><strong>User:</strong> <span id="ext-identity-email">—</span></p>
			<p><strong>Bridge code:</strong> <span id="ext-bridge-code">—</span></p>
			<p><strong>Workspace:</strong> <span id="ext-workspace-id">—</span></p>
			<label for="ext-action-input">Captured note</label>
			<textarea id="ext-action-input" rows="4" placeholder="Pull a page selection or type a note here."></textarea>
			<div class="row">
				<button id="pull-selection-button" type="button">Pull page selection</button>
				<button id="save-extension-action-button" type="button">Write durable action</button>
			</div>
			<button id="run-extension-job-button" type="button">Run digest job</button>
			<p><strong>Latest digest:</strong> <span id="ext-last-digest">—</span></p>
			<p><strong>Latest eval:</strong> <span id="ext-latest-eval">—</span></p>
			<ul id="ext-recent-actions" class="list"></ul>
		</section>

		<section class="card">
			<h2>Panel status</h2>
			<p id="panel-status-line">Waiting for extension runtime.</p>
		</section>
	</main>

	<script src="./popup_script.js"></script>
</body>

</html>
