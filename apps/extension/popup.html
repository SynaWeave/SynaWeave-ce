<!DOCTYPE html>
<!-- popup and side-panel shell for the bounded legacy flashcard workflow -->
<!-- major regions stay obvious for reviewers reading markup without opening the extension -->
<html lang="en">

<head>
	<!-- document metadata stays minimal so popup boot stays easy to scan -->
	<meta charset="UTF-8" />
	<meta http-equiv="X-UA-Compatible" content="IE=edge" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Clip → Cards</title>
	<link rel="stylesheet" href="styles.css" />
</head>

<body>
	<!-- top shell for title close action and primary toolbar buttons -->
	<header class="navbar">
		<div class="navbar_top">
			<!-- close affordance stays first in markup so the button remains easy to find in review -->
			<button id="btn-close_panel" class="close_button" aria-label="close panel">
				&times;
			</button>
			<h1>Flash Card Clipper</h1>
		</div>

		<!-- grouped action row for refresh settings and export shortcuts -->
		<nav class="toolbar">
			<button id="btn-refresh">refresh</button>
			<button id="btn-open-options" title="settings">settings</button>
			<button id="btn-export_anki" title="download TSV for Anki">anki</button>
			<button id="btn-copy_quizlet" title="copy TSV for Quizlet import">quizlet</button>
		</nav>
	</header>

	<!-- quick-add form stays near the top because it is the fastest capture path -->
	<section class="quick_add">
		<h2>Quick Add</h2>
		<div>
			<h3>Front:</h3>
			<textarea id="qa_front" placeholder="( question / prompt )" rows="3"></textarea>
		</div>

		<div>
			<h3>Back:</h3>
			<textarea id="qa_back" placeholder="( answer / hint )" rows="3"></textarea>
		</div>

		<div>
			<h3>Tags:</h3>
			<textarea id="qa_tags" placeholder="( space-separated )" rows="2"></textarea>
		</div>

		<div>
			<button id="qa_createBtn">create card</button>
		</div>
	</section>

	<!-- local note area stays separate so helper text does not mix with review cards -->
	<section class="notes" id="note-written">
		<h2>Helpful Notes</h2>
		<textarea id="noteText" placeholder="Type your notes here..." rows="4"></textarea>
		<button id="saveNoteBtn">Save Note</button>
		<button id="savePageBtn">Save This Page!</button>
		<ul id="notesContainer"></ul>
	</section>

	<!-- review region hides behind details so the capture path stays visually lighter by default -->
	<section class="due">
		<details>
			<summary class="summary-h2">Review These Today ‼️</summary>

			<ul id="due_list" class="card_list"></ul>
			<template id="card_temp">
				<li class="card">
					<div class="front"></div>
					<details class="answer">
						<summary>show answer</summary>
						<div class="back"></div>
					</details>
					<div class="rate">
						<button id="again">try again</button>
						<button id="hard">that was hard</button>
						<button id="okay">I remembered, mostly</button>
						<button id="easy">too easy</button>
					</div>
				</li>
			</template>
		</details>
	</section>

	<!-- popup script loads last so the DOM shell exists before handlers attach -->
	<script src="./popup_script.js"></script>
</body>

</html>
