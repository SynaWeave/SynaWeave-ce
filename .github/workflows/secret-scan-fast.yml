#  ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# TL;DR  -->  run the fast secret-scanning gate across repo files and built extension artifacts before merge
#
# - Later Extension Points:
#   --> add more fast scanner steps only when new ship-facing artifact paths become durable repo defaults
#
# - Role:
#   --> builds the stripped extension artifact used in client shipping checks
#   --> runs Betterleaks across the checked-out repo and generated artifact path for fast CI feedback
#
# - Exports:
#   --> `secret-scan-fast` workflow status
#
# - Consumed By:
#   --> branch protection and pull-request review flows on GitHub
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~

name: secret-scan-fast

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  betterleaks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build stripped extension artifact
        run: |
          python3 -m tools.extension.build --output build/extension

      - name: Run Betterleaks fast scan
        run: |
          docker run --rm -v "$PWD:/repo" -w /repo ghcr.io/betterleaks/betterleaks:latest dir --config /repo/.betterleaks.toml --no-banner --no-color --redact=100 --max-archive-depth 2 --exit-code 1 $(git ls-files) build/extension
