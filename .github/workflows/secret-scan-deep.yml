#  ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# TL;DR  -->  run the deep secret-scanning pass across git history and built extension artifacts in CI
#
# - Later Extension Points:
#   --> add more deep security sources only when the repo gains new governed release or storage surfaces
#
# - Role:
#   --> scans full checked-out git history with TruffleHog for deeper credential discovery
#   --> scans built extension artifacts so shipped client files get their own deeper secret pass
#
# - Exports:
#   --> `secret-scan-deep` workflow status
#
# - Consumed By:
#   --> branch protection scheduled security review and manual GitHub workflow runs
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~

name: secret-scan-deep

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trufflehog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build stripped extension artifact
        run: |
          python3 -m tools.extension.build --output build/extension

      - name: Run TruffleHog git scan
        run: |
          docker run --rm -v "$PWD:/repo" trufflesecurity/trufflehog:latest git file:///repo --results=verified,unknown --fail

      - name: Run TruffleHog artifact scan
        run: |
          docker run --rm -v "$PWD:/repo" trufflesecurity/trufflehog:latest filesystem /repo/build/extension --results=verified,unknown --fail
