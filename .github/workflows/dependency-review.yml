#  ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# TL;DR  -->  publish a dependency-review PR status, run hosted review when supported, and state when support is unavailable
#
# - Later Extension Points:
#   --> add stricter hosted dependency policy only when repository dependency graph support is fully enabled
#
# - Role:
#   --> checks whether GitHub dependency graph support is available for the repository
#   --> runs hosted dependency review only when the repository support exists
#   --> leaves an explicit PR-visible note when hosted dependency review cannot run yet
#
# - Exports:
#   --> `dependency-review / dependency-review` hosted check run
#
# - Consumed By:
#   --> branch protection and pull-request review flows for dependency-review status checks
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~

name: dependency-review

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  dependency-review:
    name: dependency-review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect dependency graph support
        id: dependency-graph
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          # ask the GitHub dependency-graph API for one SBOM because public repo metadata
          # does not always echo dependency graph status even when the feature is active
          import json
          import os
          import urllib.error
          import urllib.request

          # reuse the workflow token so the probe stays inside GitHub's bounded auth path
          request = urllib.request.Request(
              f"https://api.github.com/repos/{os.environ['REPO']}/dependency-graph/sbom",
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
              },
          )
          status = "disabled"
          enabled = False
          try:
              with urllib.request.urlopen(request) as response:
                  json.load(response)
              status = "enabled"
              enabled = True
          except urllib.error.HTTPError as exc:
              if exc.code in {403, 404}:
                  status = f"blocked:{exc.code}"
              else:
                  raise
          github_output = os.environ["GITHUB_OUTPUT"]
          # emit one boolean flag so later workflow steps can branch without shell parsing
          with open(github_output, "a", encoding="utf-8") as handle:
              handle.write(f"enabled={'true' if enabled else 'false'}\n")
              handle.write(f"status={status}\n")

          print(f"Dependency graph status: {status}")
          PY

      - name: Dependency review
        if: steps.dependency-graph.outputs.enabled == 'true'
        uses: actions/dependency-review-action@v4

      - name: Skip unsupported dependency review cleanly
        if: steps.dependency-graph.outputs.enabled != 'true'
        run: |
          echo "Skipping dependency review because dependency graph support probe returned: ${{ steps.dependency-graph.outputs.status }}"
