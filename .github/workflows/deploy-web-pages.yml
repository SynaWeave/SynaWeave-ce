#  ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# TL;DR  -->  build and deploy the static web landing page to GitHub Pages on pushes to main only
#
# - Later Extension Points:
#   --> add richer release controls only when the public web surface grows beyond one static landing page
#
# - Role:
#   --> builds `apps/web` through the existing `build:web` tooling into `build/web`
#   --> publishes that generated artifact to GitHub Pages without creating pull-request previews
#
# - Exports:
#   --> `deploy-web-pages` workflow run and GitHub Pages deployment
#
# - Consumed By:
#   --> GitHub Pages hosting for the public `apps/web` landing page
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~

name: deploy-web-pages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    name: deploy-web-pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install Bun dependencies
        run: |
          bun install --frozen-lockfile

      - name: Build public web artifact
        run: |
          bun run build:web

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Deploy GitHub Pages site
        id: deployment
        uses: actions/deploy-pages@v4
